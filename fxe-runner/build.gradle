repositories {
    mavenCentral()
}

project.version = '1.0'

dependencies {
    compile project(':fxe-process-core')
}

jar {
    manifest {
        attributes('Main-Class': 'org.fxe.runner.FxeRunnerMain')
    }
    archiveName = 'fxe-runner.jar'

    from {
        configurations.compile.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
